<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTMS - Bus Booking</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #eef3f9;
      color: #1f2937;
      min-height: 100vh;
    }

    .navbar {
      background: #0b3d91;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar h1 {
      font-size: 20px;
    }

    .navbar button {
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: transparent;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .container {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 14px;
      color: #0b3d91;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 10px;
      border: 1px solid #cfd8e3;
      border-radius: 8px;
      font-size: 15px;
    }

    .book-btn {
      width: 100%;
      border: none;
      background: #1d4ed8;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .book-btn:hover {
      background: #1e40af;
    }

    #bookingStatus {
      margin-top: 12px;
      font-weight: 600;
      min-height: 18px;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }

    th,
    td {
      border: 1px solid #d9e1eb;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #f4f7fb;
      color: #1e3a8a;
    }

    iframe {
      width: 100%;
      height: 420px;
      border: 0;
      border-radius: 10px;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <h1>Public Transport Management System</h1>
    <div style="display: flex; gap: 8px;">
      <button type="button" onclick="window.location.href='admin.html'">Admin</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Book Your Bus</h2>
      <form id="bookingForm">
        <div class="field">
          <label for="name">Passenger Name</label>
          <input type="text" id="name" required placeholder="Enter your name">
        </div>

        <div class="field">
          <label for="source">From</label>
          <input type="text" id="source" required placeholder="Source city">
        </div>

        <div class="field">
          <label for="destination">Destination</label>
          <input type="text" id="destination" required placeholder="Destination city">
        </div>

        <div class="field">
          <label for="date">Travel Date</label>
          <input type="date" id="date" required>
        </div>

        <div class="field">
          <label for="bus">Bus Type</label>
          <select id="bus" required>
            <option value="">Select bus type</option>
            <option>AC Sleeper</option>
            <option>AC Seater</option>
            <option>Non-AC Seater</option>
            <option>Electric City Bus</option>
          </select>
        </div>

        <div class="field">
          <label for="seats">Number of Seats</label>
          <input type="number" id="seats" min="1" max="6" value="1" required>
        </div>

        <button type="submit" class="book-btn">Confirm Booking</button>
      </form>
      <p id="bookingStatus"></p>
    </section>

    <section class="card">
      <h2>Destination Map</h2>
      <p id="routeInfo" style="margin-bottom: 10px;">Enter both source and destination to see route.</p>
      <iframe
        id="mapFrame"
        src="https://www.google.com/maps?q=India&output=embed"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </section>

    <section class="card full-width">
      <h2>My Bookings</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Passenger</th>
              <th>From</th>
              <th>Destination</th>
              <th>Date</th>
              <th>Bus Type</th>
              <th>Seats</th>
            </tr>
          </thead>
          <tbody id="myBookingsBody">
            <tr>
              <td colspan="7">Loading your bookings...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = "http://localhost:3000";
    const loggedInUser = localStorage.getItem("ptmsLoggedInUser");
    if (!loggedInUser) {
      window.location.href = "login.html";
    }

    const sourceInput = document.getElementById("source");
    const destinationInput = document.getElementById("destination");
    const mapFrame = document.getElementById("mapFrame");
    const routeInfo = document.getElementById("routeInfo");
    const bookingForm = document.getElementById("bookingForm");
    const bookingStatus = document.getElementById("bookingStatus");
    const logoutBtn = document.getElementById("logoutBtn");
    const myBookingsBody = document.getElementById("myBookingsBody");

    async function loadMyBookings() {
      try {
        const response = await fetch(API_BASE + "/api/bookings/" + encodeURIComponent(loggedInUser));
        const bookings = await response.json();

        if (!response.ok) {
          myBookingsBody.innerHTML = "<tr><td colspan='7'>Unable to fetch bookings.</td></tr>";
          return;
        }

        if (!bookings.length) {
          myBookingsBody.innerHTML = "<tr><td colspan='7'>No bookings found yet.</td></tr>";
          return;
        }

        myBookingsBody.innerHTML = bookings.map(function (booking) {
          return "<tr>" +
            "<td>" + booking.id + "</td>" +
            "<td>" + booking.passenger_name + "</td>" +
            "<td>" + booking.source + "</td>" +
            "<td>" + booking.destination + "</td>" +
            "<td>" + booking.travel_date + "</td>" +
            "<td>" + booking.bus_type + "</td>" +
            "<td>" + booking.seats + "</td>" +
            "</tr>";
        }).join("");
      } catch (error) {
        myBookingsBody.innerHTML = "<tr><td colspan='7'>Server not available.</td></tr>";
      }
    }

    function updateRouteMap() {
      const source = sourceInput.value.trim();
      const destination = destinationInput.value.trim();

      if (source.length > 1 && destination.length > 1) {
        mapFrame.src = "https://maps.google.com/maps?saddr=" + encodeURIComponent(source) +
          "&daddr=" + encodeURIComponent(destination) + "&output=embed";
        routeInfo.textContent = "Route: " + source + " to " + destination;
      } else if (destination.length > 1) {
        mapFrame.src = "https://www.google.com/maps?q=" + encodeURIComponent(destination) + "&output=embed";
        routeInfo.textContent = "Destination preview: " + destination;
      } else {
        routeInfo.textContent = "Enter both source and destination to see route.";
      }
    }

    sourceInput.addEventListener("input", updateRouteMap);
    destinationInput.addEventListener("input", updateRouteMap);

    bookingForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const bookingData = {
        userEmail: loggedInUser,
        name: document.getElementById("name").value.trim(),
        source: document.getElementById("source").value.trim(),
        destination: destinationInput.value.trim(),
        date: document.getElementById("date").value,
        busType: document.getElementById("bus").value,
        seats: document.getElementById("seats").value
      };

      try {
        const response = await fetch(API_BASE + "/api/bookings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(bookingData)
        });

        const data = await response.json();
        if (!response.ok) {
          bookingStatus.style.color = "#cc1f1f";
          bookingStatus.textContent = data.message || "Booking failed.";
          return;
        }

        localStorage.setItem("latestBooking", JSON.stringify(bookingData));
        bookingStatus.style.color = "#0f7a26";
        bookingStatus.textContent =
          "Booking confirmed (ID: " + data.bookingId + ") for " + bookingData.destination + " on " + bookingData.date + ".";
        updateRouteMap();
        loadMyBookings();
      } catch (error) {
        bookingStatus.style.color = "#cc1f1f";
        bookingStatus.textContent = "Server not running. Start Node backend first.";
      }
    });

    logoutBtn.addEventListener("click", function () {
      localStorage.removeItem("ptmsLoggedInUser");
      window.location.href = "login.html";
    });

    loadMyBookings();
  </script>
</body>
</html>
